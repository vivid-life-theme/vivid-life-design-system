<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vivid Life — per-flavor logo variants</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; font-family: var(--vl-font-sans); color: #171717; }
  .wrap { padding: 18px 22px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

  .card { background: #fff; border-radius: 12px; padding: 18px 20px 20px; box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04); }
  .card .head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
  .card .head .name { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .card .head .hex  { font-family: var(--vl-font-mono); font-size: 11px; color: #737373; }
  .card .head .tag  { margin-left: auto; font-family: var(--vl-font-mono); font-size: 10px; color: #737373; text-transform: uppercase; letter-spacing: 0.06em; }

  .sizes { display: flex; align-items: flex-end; justify-content: space-around; gap: 12px; padding: 6px 0; }
  .sz { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .sz img { display: block; image-rendering: -webkit-optimize-contrast; box-shadow: 0 0 0 1px rgba(0,0,0,0.04); border-radius: 4px; }
  .sz .lbl { font-family: var(--vl-font-mono); font-size: 9px; color: #737373; letter-spacing: 0.04em; }

  .surfaces { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
  .surfaces .ss {
    aspect-ratio: 1; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .surfaces .ss img { width: 64%; height: 64%; }
  .bg-paper { background: #fdfaf3; }
  .bg-noon  { background: #f5f5f5; }
  .bg-mid   { background: #171717; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Midnight -->
  <div class="card">
    <div class="head">
      <span class="name">Midnight</span>
      <span class="hex">bg #171717</span>
      <span class="tag">logo-midnight</span>
    </div>
    <div class="sizes">
      <div class="sz"><img src="_logo-midnight.png" width="96"  height="96"  alt=""><div class="lbl">96</div></div>
      <div class="sz"><img src="_logo-midnight.png" width="64"  height="64"  alt=""><div class="lbl">64</div></div>
      <div class="sz"><img src="_logo-midnight.png" width="32"  height="32"  alt=""><div class="lbl">32</div></div>
      <div class="sz"><img src="_logo-midnight.png" width="16"  height="16"  alt=""><div class="lbl">16</div></div>
    </div>
    <div class="surfaces">
      <div class="ss bg-noon"><img src="_logo-midnight.png" alt=""></div>
      <div class="ss bg-paper"><img src="_logo-midnight.png" alt=""></div>
      <div class="ss bg-mid"><img src="_logo-midnight.png" alt=""></div>
    </div>
  </div>

  <!-- Twilight -->
  <div class="card">
    <div class="head">
      <span class="name">Twilight</span>
      <span class="hex">bg #404040</span>
      <span class="tag">logo-twilight</span>
    </div>
    <div class="sizes">
      <div class="sz"><img src="_logo-twilight.png" width="96" height="96" alt=""><div class="lbl">96</div></div>
      <div class="sz"><img src="_logo-twilight.png" width="64" height="64" alt=""><div class="lbl">64</div></div>
      <div class="sz"><img src="_logo-twilight.png" width="32" height="32" alt=""><div class="lbl">32</div></div>
      <div class="sz"><img src="_logo-twilight.png" width="16" height="16" alt=""><div class="lbl">16</div></div>
    </div>
    <div class="surfaces">
      <div class="ss bg-noon"><img src="_logo-twilight.png" alt=""></div>
      <div class="ss bg-paper"><img src="_logo-twilight.png" alt=""></div>
      <div class="ss bg-mid"><img src="_logo-twilight.png" alt=""></div>
    </div>
  </div>

  <!-- Dawn -->
  <div class="card">
    <div class="head">
      <span class="name">Dawn</span>
      <span class="hex">bg #d4d4d4</span>
      <span class="tag">logo-dawn</span>
    </div>
    <div class="sizes">
      <div class="sz"><img src="_logo-dawn.png" width="96" height="96" alt=""><div class="lbl">96</div></div>
      <div class="sz"><img src="_logo-dawn.png" width="64" height="64" alt=""><div class="lbl">64</div></div>
      <div class="sz"><img src="_logo-dawn.png" width="32" height="32" alt=""><div class="lbl">32</div></div>
      <div class="sz"><img src="_logo-dawn.png" width="16" height="16" alt=""><div class="lbl">16</div></div>
    </div>
    <div class="surfaces">
      <div class="ss bg-noon"><img src="_logo-dawn.png" alt=""></div>
      <div class="ss bg-paper"><img src="_logo-dawn.png" alt=""></div>
      <div class="ss bg-mid"><img src="_logo-dawn.png" alt=""></div>
    </div>
  </div>

  <!-- Noon -->
  <div class="card">
    <div class="head">
      <span class="name">Noon</span>
      <span class="hex">bg #f5f5f5</span>
      <span class="tag">logo-noon</span>
    </div>
    <div class="sizes">
      <div class="sz"><img src="_logo-noon.png" width="96" height="96" alt=""><div class="lbl">96</div></div>
      <div class="sz"><img src="_logo-noon.png" width="64" height="64" alt=""><div class="lbl">64</div></div>
      <div class="sz"><img src="_logo-noon.png" width="32" height="32" alt=""><div class="lbl">32</div></div>
      <div class="sz"><img src="_logo-noon.png" width="16" height="16" alt=""><div class="lbl">16</div></div>
    </div>
    <div class="surfaces">
      <div class="ss bg-noon"><img src="_logo-noon.png" alt=""></div>
      <div class="ss bg-paper"><img src="_logo-noon.png" alt=""></div>
      <div class="ss bg-mid"><img src="_logo-noon.png" alt=""></div>
    </div>
  </div>

</div>
</body>
</html>
