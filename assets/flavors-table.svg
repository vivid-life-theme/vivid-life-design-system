<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 204" role="img" aria-label="4 flavors: Midnight, Twilight, Dawn, Noon">
  <title>4 flavors: Midnight, Twilight, Dawn, Noon</title>

  <!-- header -->
  <rect x="0" y="0" width="600" height="28" fill="#737373"/>
  <text x="80" y="20" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#f5f5f5">Flavor</text>
  <text x="230" y="20" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#f5f5f5">Canvas</text>
  <text x="450" y="20" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#f5f5f5">Mood</text>
  <!-- flavor rows -->
  <!-- Midnight -->
  <rect x="0" y="28" width="600" height="44" fill="#171717"/>
  <text x="14" y="54" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f5f5f5">Midnight</text>
  <text x="230" y="54" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#f5f5f5">#171717</text>
  <text x="586" y="54" text-anchor="end" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="12" fill="#f5f5f5">Deep dark, OLED-friendly</text>
  <!-- Twilight -->
  <rect x="0" y="72" width="600" height="44" fill="#404040"/>
  <text x="14" y="98" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f5f5f5">Twilight</text>
  <text x="230" y="98" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#f5f5f5">#404040</text>
  <text x="586" y="98" text-anchor="end" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="12" fill="#f5f5f5">Classic dark</text>
  <!-- Dawn -->
  <rect x="0" y="116" width="600" height="44" fill="#d4d4d4"/>
  <text x="14" y="142" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#171717">Dawn</text>
  <text x="230" y="142" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#171717">#d4d4d4</text>
  <text x="586" y="142" text-anchor="end" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="12" fill="#171717">Soft, overcast light</text>
  <!-- Noon -->
  <rect x="0" y="160" width="600" height="44" fill="#f5f5f5"/>
  <text x="14" y="186" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#171717">Noon</text>
  <text x="230" y="186" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#171717">#f5f5f5</text>
  <text x="586" y="186" text-anchor="end" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="12" fill="#171717">Crisp, high-key light</text>
</svg>
