<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" role="img" aria-label="4 flavors × 6 variants = 24 themes, all WCAG AA">
  <title>4 flavors × 6 variants = 24 themes · all WCAG AA</title>

  <!-- Flavor strip -->
  <rect x="0"   y="0" width="120" height="36" fill="#171717"/>
  <rect x="120" y="0" width="120" height="36" fill="#404040"/>
  <rect x="240" y="0" width="120" height="36" fill="#d4d4d4"/>
  <rect x="360" y="0" width="120" height="36" fill="#f5f5f5"/>
  <text x="60"  y="23" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#d4d4d4">Midnight</text>
  <text x="180" y="23" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#d4d4d4">Twilight</text>
  <text x="300" y="23" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#404040">Dawn</text>
  <text x="420" y="23" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#404040">Noon</text>

  <!-- Red -->
  <rect x="0"   y="36" width="120" height="24" fill="#ef4444"/>
  <rect x="120" y="36" width="120" height="24" fill="#fca5a5"/>
  <rect x="240" y="36" width="120" height="24" fill="#7f1d1d"/>
  <rect x="360" y="36" width="120" height="24" fill="#b91c1c"/>

  <!-- Orange -->
  <rect x="0"   y="60" width="120" height="24" fill="#f97316"/>
  <rect x="120" y="60" width="120" height="24" fill="#fdba74"/>
  <rect x="240" y="60" width="120" height="24" fill="#7c2d12"/>
  <rect x="360" y="60" width="120" height="24" fill="#c2410c"/>

  <!-- Yellow -->
  <rect x="0"   y="84" width="120" height="24" fill="#eab308"/>
  <rect x="120" y="84" width="120" height="24" fill="#eab308"/>
  <rect x="240" y="84" width="120" height="24" fill="#713f12"/>
  <rect x="360" y="84" width="120" height="24" fill="#713f12"/>

  <!-- Green -->
  <rect x="0"   y="108" width="120" height="24" fill="#84cc16"/>
  <rect x="120" y="108" width="120" height="24" fill="#84cc16"/>
  <rect x="240" y="108" width="120" height="24" fill="#365314"/>
  <rect x="360" y="108" width="120" height="24" fill="#365314"/>

  <!-- Blue -->
  <rect x="0"   y="132" width="120" height="24" fill="#93c5fd"/>
  <rect x="120" y="132" width="120" height="24" fill="#93c5fd"/>
  <rect x="240" y="132" width="120" height="24" fill="#1d4ed8"/>
  <rect x="360" y="132" width="120" height="24" fill="#1d4ed8"/>

  <!-- Purple -->
  <rect x="0"   y="156" width="120" height="24" fill="#d8b4fe"/>
  <rect x="120" y="156" width="120" height="24" fill="#d8b4fe"/>
  <rect x="240" y="156" width="120" height="24" fill="#7e22ce"/>
  <rect x="360" y="156" width="120" height="24" fill="#7e22ce"/>
</svg>
